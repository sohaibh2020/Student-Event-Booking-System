<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Event Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-brand">🎓 Event Booking</div>
            <ul class="navbar-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="bookings.html" class="active">My Bookings</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="#" id="logout-btn" onclick="logout()">Logout</a></li>
                <li id="user-info">Logged in as: <span id="user-name"></span></li>
            </ul>
        </nav>

        <!-- Bookings Page Content -->
        <div class="page-content">
            <h1>My Bookings</h1>
            <p class="page-subtitle">View and manage your event bookings</p>

            <!-- Bookings List -->
            <div id="bookings-list" class="bookings-list">
                <!-- Bookings will be loaded here by JavaScript -->
            </div>

            <!-- Empty State -->
            <div id="empty-bookings" class="empty-state" style="display:none;">
                <div class="empty-icon">📭</div>
                <h2>No Bookings Yet</h2>
                <p>You haven't booked any events yet. Go to <a href="events.html">Events</a> to book your first event!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
