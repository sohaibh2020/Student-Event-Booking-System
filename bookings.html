<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Student Event Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🎓 Event Booking</div>
            <ul class="nav-menu">
                <li><a href="events.html">Events</a></li>
                <li><a href="bookings.html" class="active">My Bookings</a></li>
                <li id="nav-user-menu">
                    <span id="userName"></span>
                    <a href="#" id="logoutBtn" onclick="logout(event)">Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="bookings-section">
        <div class="container">
            <h2>My Bookings</h2>

            <!-- Bookings Table -->
            <div id="bookingsContainer">
                <table class="bookings-table">
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Location</th>
                            <th>Booked On</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <!-- Bookings will be loaded here by JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- No Bookings Message -->
            <div id="noBookingsMessage" class="no-data-message" style="display: none;">
                <p>You have no bookings yet. <a href="events.html">Browse events</a> to make a booking!</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Student Event Booking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Check if user is logged in
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'student') {
                alert('Please login first!');
                window.location.href = 'login.html';
                return;
            }

            // Update navbar with user's name
            document.getElementById('userName').textContent = 'Welcome, ' + currentUser.fullName;

            // Load and display bookings
            loadBookings();
        });

        // Function to load and display user's bookings
        function loadBookings() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const bookingsTableBody = document.getElementById('bookingsTableBody');
            const noBookingsMessage = document.getElementById('noBookingsMessage');

            // Get bookings from localStorage
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let events = JSON.parse(localStorage.getItem('events')) || [];

            // Filter bookings for current user
            const userBookings = bookings.filter(b => b.userId === currentUser.id);

            // Clear table
            bookingsTableBody.innerHTML = '';

            if (userBookings.length === 0) {
                noBookingsMessage.style.display = 'block';
                return;
            }

            noBookingsMessage.style.display = 'none';

            // Display each booking
            userBookings.forEach(booking => {
                const event = events.find(e => e.id === booking.eventId);
                if (!event) return;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${event.name}</td>
                    <td>${event.category}</td>
                    <td>${event.date}</td>
                    <td>${event.time}</td>
                    <td>${event.location}</td>
                    <td>${new Date(booking.bookedAt).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-danger btn-small" onclick="cancelBooking('${booking.id}', '${event.name}')">Cancel</button>
                    </td>
                `;
                bookingsTableBody.appendChild(row);
            });
        }

        // Function to cancel a booking
        function cancelBooking(bookingId, eventName) {
            if (!confirm(`Are you sure you want to cancel booking for "${eventName}"?`)) {
                return;
            }

            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const booking = bookings.find(b => b.id === bookingId);

            if (!booking) {
                alert('Booking not found!');
                return;
            }

            // Update event booked count
            let events = JSON.parse(localStorage.getItem('events')) || [];
            const event = events.find(e => e.id === booking.eventId);
            if (event && event.booked > 0) {
                event.booked -= 1;
                localStorage.setItem('events', JSON.stringify(events));
            }

            // Remove booking
            bookings = bookings.filter(b => b.id !== bookingId);
            localStorage.setItem('bookings', JSON.stringify(bookings));

            alert(`Booking for "${eventName}" has been cancelled.`);
            loadBookings();
        }

        // Function to logout
        function logout(event) {
            event.preventDefault();
            localStorage.removeItem('currentUser');
            alert('Logged out successfully!');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
