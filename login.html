<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Event Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🎓 Event Booking</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="form-section">
        <div class="form-container">
            <h2>Login</h2>
            <form id="loginForm">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="loginEmail">Email:</label>
                    <input type="email" id="loginEmail" required placeholder="Enter your email">
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="loginPassword">Password:</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">Login</button>

                <!-- Error Message Display -->
                <div id="loginError" class="error-message"></div>
            </form>

            <!-- Registration Link -->
            <p class="form-footer">Don't have an account? <a href="register.html">Register here</a></p>

            <!-- Demo Credentials Info -->
            <div class="info-box">
                <h4>Demo Admin Credentials:</h4>
                <p>Email: <strong>admin@uni.com</strong></p>
                <p>Password: <strong>admin123</strong></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Student Event Booking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            // Clear previous error messages
            errorDiv.textContent = '';

            // Check admin credentials
            if (email === 'admin@uni.com' && password === 'admin123') {
                // Create admin session
                const adminUser = {
                    id: 'admin',
                    email: 'admin@uni.com',
                    fullName: 'Administrator',
                    role: 'admin'
                };
                localStorage.setItem('currentUser', JSON.stringify(adminUser));
                alert('Admin login successful!');
                window.location.href = 'admin.html';
                return;
            }

            // Get users from localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Find user with matching email and password
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                // Store current user session
                localStorage.setItem('currentUser', JSON.stringify({
                    id: user.id,
                    email: user.email,
                    fullName: user.fullName,
                    studentId: user.studentId,
                    role: 'student'
                }));
                alert('Login successful!');
                window.location.href = 'events.html';
            } else {
                errorDiv.textContent = 'Invalid email or password!';
            }
        });
    </script>
</body>
</html>
