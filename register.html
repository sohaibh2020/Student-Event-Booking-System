<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">🎓 Event Booking</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Registration Form -->
    <section class="form-section">
        <div class="form-container">
            <h2>Student Registration</h2>
            <form id="registerForm">
                <!-- Full Name Field -->
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required placeholder="Enter your university email">
                </div>

                <!-- Student ID Field -->
                <div class="form-group">
                    <label for="studentId">Student ID:</label>
                    <input type="text" id="studentId" required placeholder="Enter your student ID">
                </div>

                <!-- Department Field -->
                <div class="form-group">
                    <label for="department">Department:</label>
                    <select id="department" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Business">Business</option>
                        <option value="Arts">Arts</option>
                        <option value="Science">Science</option>
                    </select>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required placeholder="Enter a strong password">
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">Register</button>

                <!-- Error Message Display -->
                <div id="registerError" class="error-message"></div>
            </form>

            <!-- Login Link -->
            <p class="form-footer">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Student Event Booking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Handle registration form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const studentId = document.getElementById('studentId').value;
            const department = document.getElementById('department').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('registerError');

            // Clear previous error messages
            errorDiv.textContent = '';

            // Validate passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match!';
                return;
            }

            // Validate password length
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters long!';
                return;
            }

            // Get existing users from localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Check if email already exists
            if (users.find(user => user.email === email)) {
                errorDiv.textContent = 'Email already registered!';
                return;
            }

            // Check if student ID already exists
            if (users.find(user => user.studentId === studentId)) {
                errorDiv.textContent = 'Student ID already registered!';
                return;
            }

            // Create new user object
            const newUser = {
                id: Date.now().toString(),
                fullName,
                email,
                studentId,
                department,
                password,
                role: 'student', // Regular users are students
                createdAt: new Date().toISOString()
            };

            // Add user to array and save to localStorage
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            // Show success message and redirect
            alert('Registration successful! Please login to continue.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
