<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Event Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Admin Login Page -->
    <div id="admin-login" class="container">
        <div class="form-container">
            <!-- Navigation Bar -->
            <nav class="navbar">
                <div class="navbar-brand">🎓 Event Booking</div>
                <ul class="navbar-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="admin.html" class="active">Admin</a></li>
                </ul>
            </nav>

            <!-- Admin Login Form -->
            <div class="form-box">
                <h2>Admin Login</h2>
                <form id="admin-login-form" onsubmit="adminLogin(event)">
                    <div class="form-group">
                        <label for="admin-email">Email:</label>
                        <input type="email" id="admin-email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="admin-password">Password:</label>
                        <input type="password" id="admin-password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Login as Admin</button>
                </form>
            </div>

            <!-- Message Display -->
            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" style="display:none;">
        <nav class="navbar">
            <div class="navbar-brand">🎓 Admin Panel</div>
            <ul class="navbar-menu">
                <li><a href="#" onclick="showAdminTab('events')" class="admin-tab-btn active">Manage Events</a></li>
                <li><a href="#" onclick="showAdminTab('bookings')" class="admin-tab-btn">View Bookings</a></li>
                <li><a href="#" id="admin-logout-btn" onclick="adminLogout()">Logout</a></li>
            </ul>
        </nav>

        <div class="admin-content">
            <!-- Manage Events Tab -->
            <div id="events-tab" class="admin-tab" style="display:block;">
                <h1>Manage Events</h1>
                
                <!-- Add New Event Form -->
                <div class="admin-form-section">
                    <h2>Add New Event</h2>
                    <form id="add-event-form" onsubmit="addEvent(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="event-name">Event Name:</label>
                                <input type="text" id="event-name" required>
                            </div>

                            <div class="form-group">
                                <label for="event-date">Date:</label>
                                <input type="date" id="event-date" required>
                            </div>

                            <div class="form-group">
                                <label for="event-time">Time:</label>
                                <input type="time" id="event-time" required>
                            </div>

                            <div class="form-group">
                                <label for="event-location">Location:</label>
                                <input type="text" id="event-location" required>
                            </div>

                            <div class="form-group">
                                <label for="event-capacity">Capacity:</label>
                                <input type="number" id="event-capacity" min="1" required>
                            </div>

                            <div class="form-group">
                                <label for="event-category">Category:</label>
                                <input type="text" id="event-category" placeholder="e.g., Workshop, Sports, Social" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="event-description">Description:</label>
                            <textarea id="event-description" rows="4" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Add Event</button>
                    </form>
                </div>

                <!-- Events List -->
                <div class="admin-list-section">
                    <h2>All Events</h2>
                    <div id="admin-events-list" class="admin-events-list">
                        <!-- Events will be loaded here by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- View Bookings Tab -->
            <div id="bookings-tab" class="admin-tab" style="display:none;">
                <h1>All Event Bookings</h1>
                <div id="admin-bookings-list" class="admin-bookings-list">
                    <!-- Bookings will be loaded here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Event Modal -->
    <div id="edit-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Event</h2>
            <form id="edit-event-form" onsubmit="saveEventEdit(event)">
                <div class="form-group">
                    <label for="edit-event-name">Event Name:</label>
                    <input type="text" id="edit-event-name" required>
                </div>

                <div class="form-group">
                    <label for="edit-event-date">Date:</label>
                    <input type="date" id="edit-event-date" required>
                </div>

                <div class="form-group">
                    <label for="edit-event-time">Time:</label>
                    <input type="time" id="edit-event-time" required>
                </div>

                <div class="form-group">
                    <label for="edit-event-location">Location:</label>
                    <input type="text" id="edit-event-location" required>
                </div>

                <div class="form-group">
                    <label for="edit-event-capacity">Capacity:</label>
                    <input type="number" id="edit-event-capacity" min="1" required>
                </div>

                <div class="form-group">
                    <label for="edit-event-category">Category:</label>
                    <input type="text" id="edit-event-category" required>
                </div>

                <div class="form-group">
                    <label for="edit-event-description">Description:</label>
                    <textarea id="edit-event-description" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
