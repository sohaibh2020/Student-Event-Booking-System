<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Event Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-brand">🎓 Event Booking</div>
            <ul class="navbar-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html" class="active">Events</a></li>
                <li><a href="bookings.html" id="bookings-link" style="display:none;">My Bookings</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="#" id="logout-btn" style="display:none;" onclick="logout()">Logout</a></li>
                <li id="user-info" style="display:none;">Logged in as: <span id="user-name"></span></li>
            </ul>
        </nav>

        <!-- Events Page Content -->
        <div class="page-content">
            <h1>Available Events</h1>
            <p class="page-subtitle">Browse and book your favorite events</p>

            <!-- Filter Section -->
            <div class="filter-section">
                <input type="text" id="search-events" class="search-input" placeholder="Search events...">
            </div>

            <!-- Events Grid -->
            <div class="events-grid" id="events-grid">
                <!-- Events will be loaded here by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Book Event Modal -->
    <div id="book-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeBookModal()">&times;</span>
            <h2>Book Event</h2>
            <div id="book-modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
